<!doctype html>
<!-- Minimal same-origin host for Play! (jpd002/Play-, BSD-2-Clause — see
     https://github.com/jpd002/Play-). We drive the emscripten module directly:
     the parent posts a File; we boot it. No third-party UI, full-bleed canvas. -->
<html>
<head>
<meta charset="utf-8" />
<!-- diagnostics tracer: posts a live trace to the parent console (Ps2.tsx shows
     it via the shared DiagOverlay). Loads first so it hooks console/errors
     before the emulator boots. -->
<script src="/diag-core.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; object-fit: contain; outline: none; }
</style>
</head>
<body>
<!-- id MUST be "outputCanvas": the wasm hardcodes the "#outputCanvas" selector
     for its WebGL context — any other id boots to a black screen. -->
<canvas id="outputCanvas" width="640" height="480" tabindex="0"></canvas>
<script type="module">
  import Play from "/play/Play.js";
  // The wasm reads the disc through this device (mirrors upstream's wiring).
  class DiscImageDevice {
    constructor(module) { this.module = module; this.doneFlag = false; this.file = null; }
    read(ptr, offset, size) {
      if (!this.file) throw new Error("No file set.");
      this.doneFlag = false;
      this.file.slice(offset, offset + size).arrayBuffer().then((buf) => {
        this.module.HEAPU8.set(new Uint8Array(buf), ptr);
        this.doneFlag = true;
      });
    }
    getFileSize() { if (!this.file) throw new Error("No file set."); return this.file.size; }
    isDone() { return this.doneFlag; }
    setFile(f) { this.file = f; }
  }

  const canvas = document.getElementById("outputCanvas");
  let mod = null;
  const tell = (type, extra) => parent.postMessage(Object.assign({ type }, extra || {}), location.origin);

  // —— save persistence ——————————————————————————————————————————————
  // Play! keeps memory cards (vfs/mc0, vfs/mc1) and save states in this MEMFS
  // dir, which vanishes on reload. We snapshot it to IndexedDB (one record per
  // profile — like one physical memory card) and restore it before a game
  // boots, so saves survive. Only vfs + states are persisted (the rest is
  // rebuilt by initVm).
  const DATA = "/home/web_user/.local/share/Play Data Files";

  // —— multiplayer: controller port 2 (player 2) ————————————————————————
  // Play!'s web build only wires pad 0 (see upstream ui_js/Main.cpp). But its
  // InputBindingManager auto-loads bindings for ALL pads from this profile at
  // initVm time, and Main.cpp only OVERRIDES pad 0 afterwards — so a profile
  // that binds pad2 survives and gives us a real 2nd controller with NO wasm
  // rebuild. Injected input reaches the emulator as synthetic KeyboardEvents on
  // #outputCanvas (same path the gamepad bridge already uses for pad 0). We pick
  // plain-ASCII keyIds: pad 0 uses enum keyIds (>=0xFF80) so there is zero
  // collision, and unrecognized codes map to code[0] in the emscripten provider.
  // __p2codes is the single source of truth the host-side injector reads.
  const P2 = {
    start: 33, select: 34, dpad_up: 35, dpad_down: 36, dpad_left: 37, dpad_right: 38,
    cross: 39, circle: 40, square: 41, triangle: 42,
    l1: 43, r1: 44, l2: 45, r2: 46, l3: 47, r3: 48,
    analog_left_x: [49, 50], analog_left_y: [51, 52],
    analog_right_x: [53, 54], analog_right_y: [55, 56],
  };
  window.__p2codes = P2;
  const EMSC_PROVIDER = 1164792675; // 'EmSc' as a uint32 (multichar constant)
  function writeInputProfile() {
    const pref = (name, type, value) => `\t<Preference Name="${name}" Type="${type}" Value="${value}" />`;
    const lines = ["<Config>"];
    const target = (base, keyId) => {
      lines.push(pref(base + ".providerId", "integer", EMSC_PROVIDER));
      lines.push(pref(base + ".deviceId", "string", "0:0:0:0:0:0"));
      lines.push(pref(base + ".keyId", "integer", keyId));
      lines.push(pref(base + ".keyType", "integer", 0)); // KEYTYPE::BUTTON
    };
    for (const [btn, key] of Object.entries(P2)) {
      const b = `input.pad2.${btn}`;
      if (Array.isArray(key)) { // simulated axis: bindingtype 2, two key targets
        lines.push(pref(b + ".bindingtype", "integer", 2));
        target(b + ".bindingtarget1", key[0]);
        target(b + ".bindingtarget2", key[1]);
      } else { // simple button: bindingtype 1
        lines.push(pref(b + ".bindingtype", "integer", 1));
        target(b + ".bindingtarget1", key);
      }
    }
    lines.push("</Config>", "");
    const xml = lines.join("\r\n");
    mod.FS.mkdirTree(DATA + "/inputprofiles");
    mod.FS.writeFile(DATA + "/inputprofiles/default.xml", xml);
  }
  // snapshot the whole data dir (memory cards under vfs/, save states, etc.) so
  // a save is captured wherever the emulator writes it
  const PERSIST = [""];
  const SAVE_DB = "asp-ps2", SAVE_STORE = "cards";
  const idb = () => new Promise((res, rej) => {
    const r = indexedDB.open(SAVE_DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(SAVE_STORE);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
  const idbGet = async (k) => { const d = await idb(); return new Promise((res) => { const q = d.transaction(SAVE_STORE, "readonly").objectStore(SAVE_STORE).get(k); q.onsuccess = () => res(q.result ?? null); q.onerror = () => res(null); }); };
  const idbPut = async (k, v) => { const d = await idb(); return new Promise((res) => { const q = d.transaction(SAVE_STORE, "readwrite").objectStore(SAVE_STORE).put(v, k); q.onsuccess = () => res(); q.onerror = () => res(); }); };

  function walkFiles(dir, out) {
    let ents; try { ents = mod.FS.readdir(dir); } catch { return out; }
    for (const n of ents) {
      if (n === "." || n === "..") continue;
      const fp = dir + "/" + n;
      let m; try { m = mod.FS.stat(fp).mode; } catch { continue; }
      if (mod.FS.isDir(m)) walkFiles(fp, out);
      else { try { out[fp] = mod.FS.readFile(fp); } catch { /* skip */ } }
    }
    return out;
  }
  async function snapshot(key) {
    if (!mod || !key) return 0;
    const files = {};
    for (const sub of PERSIST) walkFiles(DATA + sub, files);
    await idbPut(key, files);
    return Object.keys(files).length;
  }
  async function restore(key) {
    if (!mod || !key) return;
    const files = await idbGet(key);
    if (!files) return;
    for (const fp of Object.keys(files)) {
      const dir = fp.slice(0, fp.lastIndexOf("/"));
      try { mod.FS.mkdirTree(dir); } catch { /* exists */ }
      try { mod.FS.writeFile(fp, files[fp]); } catch { /* skip */ }
    }
  }

  Play({
    canvas,
    locateFile: (f) => "/play/" + f,
    mainScriptUrlOrBlob: location.origin + "/play/Play.js",
  }).then((m) => {
    mod = m;
    window.__mod = m; // debug/stats handle (same-origin parent can read fps)
    mod.discImageDevice = new DiscImageDevice(mod);
    mod.FS.mkdir("/work");
    // Write the pad2 input profile BEFORE initVm — the binding manager loads it
    // during initVm, so it must already exist in the FS at this point.
    try { writeInputProfile(); } catch (e) { console.warn("[mp] input profile write failed", e); }
    // initVm creates the VM + WebGL context (#outputCanvas) + input + sound.
    // Without this ccall nothing boots — bootElf/bootDiscImage assume the VM exists.
    mod.ccall("initVm", "", [], []);
    tell("play-ready");
  }).catch((e) => tell("play-error", { message: String(e).slice(0, 200) }));

  addEventListener("message", async (e) => {
    if (e.origin !== location.origin || !e.data) return;
    if (e.data.type === "play-boot" && e.data.file && mod) {
      try {
        await restore(e.data.saveKey); // bring back this profile's memory card first
        const f = e.data.file, name = f.name;
        if (name.toLowerCase().endsWith(".elf")) {
          const bytes = new Uint8Array(await f.arrayBuffer());
          const h = mod.FS.open(name, "w+");
          mod.FS.write(h, bytes, 0, bytes.length, 0);
          mod.FS.close(h);
          mod.bootElf(name);
        } else {
          mod.discImageDevice.setFile(f);
          mod.bootDiscImage(name);
        }
        canvas.focus();
        tell("play-booted");
      } catch (err) {
        tell("play-error", { message: String(err).slice(0, 200) });
      }
    }
    if (e.data.type === "play-save" && mod) {
      const count = await snapshot(e.data.saveKey);
      tell("play-saved", { count });
    }
  });
  addEventListener("click", () => canvas.focus());
</script>
</body>
</html>
